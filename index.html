<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DevOps AI Search</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        input { width: 100%; padding: 10px; font-size: 16px; }
        #result { margin-top: 20px; font-size: 18px; }
    </style>
</head>
<body>

<h2>DevOps AI Search</h2>
<input type="text" id="searchInput" placeholder="Type your DevOps question..." />

<div id="result">Answer will appear here...</div>

<script>
    // Small DevOps FAQ database
    const devopsIndex = {
        "what is devops": "DevOps is a set of practices that combines software development (Dev) and IT operations (Ops) to shorten the development lifecycle and provide continuous delivery.",
        "ci/cd": "CI/CD stands for Continuous Integration and Continuous Deployment, a key DevOps practice to automate building, testing, and deploying applications.",
        "jenkins": "Jenkins is an open-source automation server that helps automate parts of software development related to building, testing, and deploying, facilitating continuous integration.",
        "docker": "Docker is a platform used to develop, ship, and run applications inside containers, providing consistent environments across development and production.",
        "kubernetes": "Kubernetes is an open-source container orchestration system for automating application deployment, scaling, and management.",
        "infrastructure as code": "Infrastructure as Code (IaC) is a practice of managing and provisioning computing infrastructure through machine-readable configuration files, rather than physical hardware configuration or interactive configuration tools."
    };

    const searchInput = document.getElementById('searchInput');
    const resultDiv = document.getElementById('result');

    searchInput.addEventListener('input', function() {
        const query = searchInput.value.toLowerCase().trim();
        if(devopsIndex[query]) {
            resultDiv.textContent = devopsIndex[query];
        } else {
            resultDiv.textContent = "No answer found. Try another DevOps question.";
        }
    });
</script>

</body>
</html>
